spring:
  profiles:
    active:
      - dev

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  application:
    security:
      jwt:
        issuer: voxa-api
        secret-key: ${JWT_SECRET}
      hash:
        secret-key: ${HASH_SECRET}
    mail:
      from: ${MAIL_FROM}
    client-url: ${CLIENT_URL}

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}